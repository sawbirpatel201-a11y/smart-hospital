<!DOCTYPE html>
<html>

<head>

    <title>Patient Queue</title>

    <style>
        body {
            font-family: Segoe UI;
            text-align: center;
            background: #f4f6f9;
        }
        
        h1 {
            margin-top: 30px;
        }
        
        .token {
            font-size: 120px;
            color: #1c6cb3;
            margin-top: 40px;
        }
        
        button {
            padding: 10px 20px;
            font-size: 18px;
            margin-top: 30px;
        }
    </style>

    <script>
        let currentToken = 1;

        function nextToken() {

            document.getElementById("token").innerText = currentToken;

            currentToken++;

        }
    </script>

</head>

<body>

    <h1>Now Serving Token</h1>

    <div class="token" id="token">1</div>

    <button onclick="nextToken()">Next Patient</button>

</body>

</html>
