<!DOCTYPE html>
<html>

<head>

    <title>Hospital Patient Registration</title>

    <style>
        body {
            margin: 0;
            font-family: Segoe UI, Arial;
            background: linear-gradient(135deg, #e3efff, #ffffff);
        }
        
        .overlay {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }
        
        .container {
            width: 1000px;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        }
        
        h1 {
            text-align: center;
            color: #1c6cb3;
            margin-bottom: 30px;
        }
        
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
        }
        
        label {
            font-weight: 600;
            margin-bottom: 5px;
        }
        
        input,
        textarea {
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }
        
        textarea {
            height: 40px;
            resize: none;
        }
        
        .sex-line {
            margin-top: 15px;
        }
        
        .section {
            margin-top: 25px;
        }
        
        .category-btn {
            width: 100%;
            padding: 10px;
            background: #1c6cb3;
            color: white;
            border: none;
            border-radius: 6px;
            margin-top: 10px;
            cursor: pointer;
            text-align: left;
        }
        
        .symptom-box {
            display: none;
            background: #f8faff;
            border: 1px solid #ddd;
            border-radius: 6px;
            padding: 10px;
        }
        
        .symptom-item {
            margin: 5px 0;
        }
        
        .submit-btn {
            margin-top: 25px;
            width: 100%;
            padding: 12px;
            background: #1c6cb3;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>

    <script>
        function toggleSymptoms(id) {

            var box = document.getElementById(id);

            if (box.style.display === "block") {
                box.style.display = "none";
            } else {
                box.style.display = "block";
            }

        }

        function captureData(event) {

            event.preventDefault();

            var name = document.getElementById("patientName").value.trim();
            var age = document.getElementById("age").value.trim();
            var mobile = document.getElementById("mobile").value.trim();

            if (name === "") {
                alert("Enter patient name");
                return;
            }

            if (age === "" || age < 1 || age > 120) {
                alert("Enter valid age");
                return;
            }

            if (mobile.length != 10) {
                alert("Enter 10 digit mobile number");
                return;
            }

            var symptoms = document.querySelectorAll(".symptom:checked");

            if (symptoms.length === 0) {
                alert("Select at least one symptom");
                return;
            }

            var ward = "General Ward - Ward No.1";

            symptoms.forEach(function(sym) {

                var value = sym.value.toLowerCase();

                if (value.includes("chest") || value.includes("heartbeat")) {
                    ward = "Cardio Ward - Ward No.2";
                } else if (value.includes("headache") || value.includes("seizure")) {
                    ward = "Neuro Ward - Ward No.3";
                } else if (value.includes("rash") || value.includes("itching")) {
                    ward = "Allergy Ward - Ward No.4";
                } else if (value.includes("ear") || value.includes("nose")) {
                    ward = "ENT Ward - Ward No.7";
                } else if (value.includes("eye")) {
                    ward = "Eye Ward - Ward No.8";
                }

            });

            alert("Assigned Ward : " + ward);

        }
    </script>

</head>

<body>

    <div class="overlay">

        <div class="container">

            <h1>Patient Registration</h1>

            <form onsubmit="captureData(event)">

                <div class="form-grid">

                    <div class="form-group">
                        <label>Patient Name</label>
                        <input type="text" id="patientName">
                    </div>

                    <div class="form-group">
                        <label>Age</label>
                        <input type="number" id="age">
                    </div>

                    <div class="form-group">
                        <label>Mobile</label>
                        <input type="text" id="mobile">
                    </div>

                    <div class="form-group">
                        <label>Address</label>
                        <textarea></textarea>
                    </div>

                </div>

                <div class="sex-line">

                    <label>Sex</label>

                    <input type="radio" name="sex"> Male
                    <input type="radio" name="sex"> Female
                    <input type="radio" name="sex"> Other

                </div>

                <div class="section">

                    <label>Symptoms</label>

                    <!-- GENERAL -->

                    <button type="button" class="category-btn" onclick="toggleSymptoms('general')">General Symptoms</button>

                    <div id="general" class="symptom-box">

                        <div class="symptom-item"><input type="checkbox" class="symptom" value="fever"> Fever</div>
                        <div class="symptom-item"><input type="checkbox" class="symptom" value="chills"> Chills</div>
                        <div class="symptom-item"><input type="checkbox" class="symptom" value="fatigue"> Fatigue</div>
                        <div class="symptom-item"><input type="checkbox" class="symptom" value="weakness"> Weakness</div>
                        <div class="symptom-item"><input type="checkbox" class="symptom" value="weight loss"> Weight Loss</div>

                    </div>

                    <!-- RESPIRATORY -->

                    <button type="button" class="category-btn" onclick="toggleSymptoms('resp')">Respiratory Symptoms</button>

                    <div id="resp" class="symptom-box">

                        <div class="symptom-item"><input type="checkbox" class="symptom" value="cough"> Cough</div>
                        <div class="symptom-item"><input type="checkbox" class="symptom" value="dry cough"> Dry Cough</div>
                        <div class="symptom-item"><input type="checkbox" class="symptom" value="shortness breath"> Shortness of Breath</div>
                        <div class="symptom-item"><input type="checkbox" class="symptom" value="wheezing"> Wheezing</div>

                    </div>

                    <!-- CARDIO -->

                    <button type="button" class="category-btn" onclick="toggleSymptoms('cardio')">Cardiovascular Symptoms</button>

                    <div id="cardio" class="symptom-box">

                        <div class="symptom-item"><input type="checkbox" class="symptom" value="chest pain"> Chest Pain</div>
                        <div class="symptom-item"><input type="checkbox" class="symptom" value="palpitations"> Palpitations</div>
                        <div class="symptom-item"><input type="checkbox" class="symptom" value="heartbeat"> Irregular Heartbeat</div>

                    </div>

                    <!-- NEURO -->

                    <button type="button" class="category-btn" onclick="toggleSymptoms('neuro')">Neurological Symptoms</button>

                    <div id="neuro" class="symptom-box">

                        <div class="symptom-item"><input type="checkbox" class="symptom" value="headache"> Headache</div>
                        <div class="symptom-item"><input type="checkbox" class="symptom" value="migraine"> Migraine</div>
                        <div class="symptom-item"><input type="checkbox" class="symptom" value="seizure"> Seizures</div>

                    </div>

                    <!-- ENT -->

                    <button type="button" class="category-btn" onclick="toggleSymptoms('ent')">Ear / Nose Symptoms</button>

                    <div id="ent" class="symptom-box">

                        <div class="symptom-item"><input type="checkbox" class="symptom" value="ear pain"> Ear Pain</div>
                        <div class="symptom-item"><input type="checkbox" class="symptom" value="hearing loss"> Hearing Loss</div>
                        <div class="symptom-item"><input type="checkbox" class="symptom" value="nose bleeding"> Nose Bleeding</div>

                    </div>

                    <!-- EYE -->

                    <button type="button" class="category-btn" onclick="toggleSymptoms('eye')">Eye Symptoms</button>

                    <div id="eye" class="symptom-box">

                        <div class="symptom-item"><input type="checkbox" class="symptom" value="eye pain"> Eye Pain</div>
                        <div class="symptom-item"><input type="checkbox" class="symptom" value="blurred vision"> Blurred Vision</div>

                    </div>

                    <!-- SKIN -->

                    <button type="button" class="category-btn" onclick="toggleSymptoms('skin')">Skin / Allergy Symptoms</button>

                    <div id="skin" class="symptom-box">

                        <div class="symptom-item"><input type="checkbox" class="symptom" value="rash"> Rash</div>
                        <div class="symptom-item"><input type="checkbox" class="symptom" value="itching"> Itching</div>

                    </div>

                </div>

                <button class="submit-btn">Submit Registration</button>

            </form>

        </div>

    </div>

</body>

</html>
