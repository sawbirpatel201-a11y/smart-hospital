<!DOCTYPE html>
<html>

<head>

    <title>Smart Hospital Patient Registration</title>

    <style>
        body {
            margin: 0;
            font-family: Segoe UI, Arial;
            background: linear-gradient(135deg, #e3efff, #ffffff);
        }
        
        .container {
            width: 1000px;
            margin: auto;
            margin-top: 30px;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        }
        
        h1 {
            text-align: center;
            color: #1c6cb3;
            margin-bottom: 25px;
        }
        /* GRID LAYOUT */
        
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
        }
        
        label {
            font-weight: 600;
            margin-bottom: 5px;
        }
        
        input,
        textarea {
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #ccc;
            text-transform: uppercase;
        }
        
        textarea {
            height: 45px;
            resize: none;
        }
        
        .section {
            margin-top: 25px;
        }
        
        .category {
            background: #1c6cb3;
            color: white;
            padding: 8px;
            border-radius: 6px;
            margin-top: 10px;
        }
        
        .symptom-list {
            margin-left: 10px;
            margin-bottom: 10px;
        }
        
        button {
            margin-top: 20px;
            padding: 12px;
            width: 100%;
            background: #1c6cb3;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>

    <script>
        function registerPatient(event) {

            event.preventDefault();

            var name = document.getElementById("name").value.trim();
            var age = document.getElementById("age").value;
            var mobile = document.getElementById("mobile").value;
            var address = document.getElementById("address").value;

            /* VALIDATION */

            var namePattern = /^[A-Za-z ]+$/;

            if (!namePattern.test(name)) {
                alert("Patient name must contain only letters");
                return;
            }

            if (age < 1 || age > 120) {
                alert("Age must be between 1 and 120");
                return;
            }

            var mobilePattern = /^[0-9]{10}$/;

            if (!mobilePattern.test(mobile)) {
                alert("Mobile number must be exactly 10 digits");
                return;
            }

            if (address === "") {
                alert("Please enter address");
                return;
            }

            /* SYMPTOMS */

            var symptoms = document.querySelectorAll(".symptom:checked");

            if (symptoms.length === 0) {
                alert("Please select at least one symptom");
                return;
            }

            /* WARD ASSIGNMENT */

            var ward = "General Ward - Ward No.1";

            symptoms.forEach(function(sym) {

                var value = sym.value.toLowerCase();

                if (value.includes("chest") || value.includes("heartbeat")) {
                    ward = "Cardio Ward - Ward No.2";
                } else if (value.includes("headache") || value.includes("seizure")) {
                    ward = "Neuro Ward - Ward No.3";
                } else if (value.includes("ear") || value.includes("nose")) {
                    ward = "ENT Ward - Ward No.7";
                } else if (value.includes("eye")) {
                    ward = "Eye Ward - Ward No.8";
                } else if (value.includes("rash") || value.includes("itching")) {
                    ward = "Allergy Ward - Ward No.4";
                }

            });

            /* PATIENT ID */

            let patientCounter = localStorage.getItem("patientCounter");

            if (patientCounter === null) {
                patientCounter = 1;
            } else {
                patientCounter = parseInt(patientCounter) + 1;
            }

            localStorage.setItem("patientCounter", patientCounter);

            var patientID = "P" + String(patientCounter).padStart(4, '0');

            /* TOKEN WARD WISE */

            let tokenCounter = localStorage.getItem(ward);

            if (tokenCounter === null) {
                tokenCounter = 1;
            } else {
                tokenCounter = parseInt(tokenCounter) + 1;
            }

            localStorage.setItem(ward, tokenCounter);

            var token = String(tokenCounter).padStart(2, '0');

            /* REDIRECT */

            window.location.href = "success.html?id=" + patientID + "&token=" + token + "&ward=" + encodeURIComponent(ward);

        }
    </script>

</head>

<body>

    <div class="container">

        <h1>Patient Registration</h1>

        <form onsubmit="registerPatient(event)">

            <div class="form-grid">

                <div class="form-group">
                    <label>Patient Name</label>
                    <input type="text" id="name">
                </div>

                <div class="form-group">
                    <label>Age</label>
                    <input type="number" id="age" min="1" max="120">
                </div>

                <div class="form-group">
                    <label>Mobile</label>
                    <input type="text" id="mobile" maxlength="10">
                </div>

                <div class="form-group">
                    <label>Address</label>
                    <textarea id="address"></textarea>
                </div>

            </div>

            <div class="section">

                <h3>Symptoms</h3>

                <div class="category">General Symptoms</div>
                <div class="symptom-list">
                    <label><input type="checkbox" class="symptom" value="fever"> Fever</label><br>
                    <label><input type="checkbox" class="symptom" value="fatigue"> Fatigue</label><br>
                    <label><input type="checkbox" class="symptom" value="weakness"> Weakness</label>
                </div>

                <div class="category">Respiratory Symptoms</div>
                <div class="symptom-list">
                    <label><input type="checkbox" class="symptom" value="cough"> Cough</label><br>
                    <label><input type="checkbox" class="symptom" value="shortness breath"> Shortness of Breath</label><br>
                    <label><input type="checkbox" class="symptom" value="wheezing"> Wheezing</label>
                </div>

                <div class="category">Cardiovascular Symptoms</div>
                <div class="symptom-list">
                    <label><input type="checkbox" class="symptom" value="chest pain"> Chest Pain</label><br>
                    <label><input type="checkbox" class="symptom" value="heartbeat"> Irregular Heartbeat</label>
                </div>

                <div class="category">Neurological Symptoms</div>
                <div class="symptom-list">
                    <label><input type="checkbox" class="symptom" value="headache"> Headache</label><br>
                    <label><input type="checkbox" class="symptom" value="seizure"> Seizure</label>
                </div>

                <div class="category">ENT Symptoms</div>
                <div class="symptom-list">
                    <label><input type="checkbox" class="symptom" value="ear pain"> Ear Pain</label><br>
                    <label><input type="checkbox" class="symptom" value="nose bleeding"> Nose Bleeding</label>
                </div>

                <div class="category">Eye Symptoms</div>
                <div class="symptom-list">
                    <label><input type="checkbox" class="symptom" value="eye pain"> Eye Pain</label><br>
                    <label><input type="checkbox" class="symptom" value="blurred vision"> Blurred Vision</label>
                </div>

                <div class="category">Skin / Allergy Symptoms</div>
                <div class="symptom-list">
                    <label><input type="checkbox" class="symptom" value="rash"> Rash</label><br>
                    <label><input type="checkbox" class="symptom" value="itching"> Itching</label>
                </div>

            </div>

            <button>Register Patient</button>

        </form>

    </div>

</body>

</html>
