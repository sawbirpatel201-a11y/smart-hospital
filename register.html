<!DOCTYPE html>
<html>

<head>

    <title>Patient Registration</title>

    <style>
        body {
            margin: 0;
            font-family: Segoe UI, Arial;
            background: linear-gradient(135deg, #dfe9f3, #ffffff);
            min-height: 100vh;
        }
        
        .overlay {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 50px;
        }
        
        .container {
            width: 900px;
            padding: 40px;
            border-radius: 12px;
            background: white;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        }
        
        h1 {
            text-align: center;
            color: #1c6cb3;
            margin-bottom: 30px;
        }
        
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
        }
        
        label {
            font-weight: 600;
            margin-bottom: 5px;
        }
        
        input,
        textarea {
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #ccc;
            text-transform: uppercase;
        }
        
        textarea {
            resize: none;
            height: 40px;
        }
        
        .sex-line {
            margin-top: 15px;
        }
        
        .section {
            margin-top: 25px;
        }
        
        .category-btn {
            width: 100%;
            padding: 10px;
            background: #1c6cb3;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
            text-align: left;
        }
        
        .symptom-box {
            display: none;
            border: 1px solid #ddd;
            padding: 10px;
            margin-top: 5px;
            border-radius: 6px;
            background: #f8faff;
        }
        
        .symptom-item {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 4px 0;
        }
        
        .submit-btn {
            margin-top: 25px;
            width: 100%;
            padding: 12px;
            background: #1c6cb3;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>

    <script>
        function toggleSymptoms(id) {

            var box = document.getElementById(id);

            if (box.style.display === "block") {
                box.style.display = "none";
            } else {
                box.style.display = "block";
            }

        }

        function captureData(event) {

            event.preventDefault();

            var name = document.getElementById("patientName").value.trim();
            var age = document.getElementById("age").value.trim();
            var mobile = document.getElementById("mobile").value.trim();
            var address = document.getElementById("address").value.trim();

            /* VALIDATION */

            var namePattern = /^[A-Za-z ]+$/;

            if (!namePattern.test(name)) {
                alert("Patient Name must contain only letters");
                return;
            }

            if (age === "" || age <= 0 || age > 150) {
                alert("Age must be between 1 and 150");
                return;
            }

            var mobilePattern = /^[0-9]{10}$/;

            if (!mobilePattern.test(mobile)) {
                alert("Mobile number must be exactly 10 digits");
                return;
            }

            if (address === "") {
                alert("Please enter Address");
                return;
            }

            var sex = document.querySelector('input[name="sex"]:checked');

            if (!sex) {
                alert("Please select Sex");
                return;
            }

            /* SYMPTOMS */

            var symptoms = document.querySelectorAll(".symptom:checked");

            if (symptoms.length === 0) {
                alert("Please select at least one Symptom");
                return;
            }

            /* AUTO DEPARTMENT */

            var department = "General Medicine";

            symptoms.forEach(function(sym) {

                var value = sym.value.toLowerCase();

                if (value.includes("eye") || value.includes("vision")) {
                    department = "Ophthalmology";
                } else if (value.includes("ear") || value.includes("nose")) {
                    department = "ENT";
                } else if (value.includes("chest") || value.includes("heartbeat")) {
                    department = "Cardiology";
                } else if (value.includes("skin") || value.includes("rash")) {
                    department = "Dermatology";
                }

            });

            /* GENERATE ID */

            var patientID = "P" + Math.floor(Math.random() * 10000);

            /* TOKEN */

            var token = Math.floor(Math.random() * 50) + 1;

            /* REDIRECT */

            window.location.href = "success.html?id=" + patientID + "&token=" + token + "&dept=" + department;

        }
    </script>

</head>

<body>

    <div class="overlay">

        <div class="container">

            <h1>Patient Registration</h1>

            <form onsubmit="captureData(event)">

                <div class="form-grid">

                    <div class="form-group">
                        <label>Patient Name</label>
                        <input type="text" id="patientName">
                    </div>

                    <div class="form-group">
                        <label>Age</label>
                        <input type="number" id="age" min="1" max="150">
                    </div>

                    <div class="form-group">
                        <label>Mobile No.</label>
                        <input type="text" id="mobile" maxlength="10">
                    </div>

                    <div class="form-group">
                        <label>Address</label>
                        <textarea id="address"></textarea>
                    </div>

                </div>

                <div class="sex-line">

                    <label>Sex</label>

                    <input type="radio" name="sex"> Male
                    <input type="radio" name="sex"> Female
                    <input type="radio" name="sex"> Other

                </div>

                <div class="section">

                    <label>Symptoms</label>

                    <button type="button" class="category-btn" onclick="toggleSymptoms('gen')">1. General Symptoms</button>

                    <div id="gen" class="symptom-box">

                        <div class="symptom-item"><input type="checkbox" class="symptom" value="fever"> Fever</div>
                        <div class="symptom-item"><input type="checkbox" class="symptom" value="chills"> Chills</div>
                        <div class="symptom-item"><input type="checkbox" class="symptom" value="fatigue"> Fatigue</div>

                    </div>

                    <button type="button" class="category-btn" onclick="toggleSymptoms('eye')">8. Eye Symptoms</button>

                    <div id="eye" class="symptom-box">

                        <div class="symptom-item"><input type="checkbox" class="symptom" value="eye pain"> Eye Pain</div>
                        <div class="symptom-item"><input type="checkbox" class="symptom" value="blurred vision"> Blurred Vision</div>

                    </div>

                    <button type="button" class="category-btn" onclick="toggleSymptoms('ear')">9. Ear Symptoms</button>

                    <div id="ear" class="symptom-box">

                        <div class="symptom-item"><input type="checkbox" class="symptom" value="ear pain"> Ear Pain</div>

                    </div>

                    <button type="button" class="category-btn" onclick="toggleSymptoms('nose')">10. Nose Symptoms</button>

                    <div id="nose" class="symptom-box">

                        <div class="symptom-item"><input type="checkbox" class="symptom" value="nose bleeding"> Nose Bleeding</div>

                    </div>

                    <button type="button" class="category-btn" onclick="toggleSymptoms('card')">3. Cardiovascular Symptoms</button>

                    <div id="card" class="symptom-box">

                        <div class="symptom-item"><input type="checkbox" class="symptom" value="chest pain"> Chest Pain</div>
                        <div class="symptom-item"><input type="checkbox" class="symptom" value="heartbeat"> Palpitations</div>

                    </div>

                    <button type="button" class="category-btn" onclick="toggleSymptoms('skin')">7. Skin Symptoms</button>

                    <div id="skin" class="symptom-box">

                        <div class="symptom-item"><input type="checkbox" class="symptom" value="skin rash"> Rash</div>
                        <div class="symptom-item"><input type="checkbox" class="symptom" value="skin itching"> Itching</div>

                    </div>

                </div>

                <button class="submit-btn">Submit Registration</button>

            </form>

        </div>

    </div>

</body>

</html>
