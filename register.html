<!DOCTYPE html>
<html>

<head>

    <title>Patient Registration</title>

    <style>
        body {
            margin: 0;
            font-family: Segoe UI, Arial;
            background: linear-gradient(135deg, #dfe9f3, #ffffff);
            min-height: 100vh;
        }
        
        .overlay {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 50px;
        }
        
        .container {
            width: 900px;
            padding: 40px;
            border-radius: 12px;
            background: white;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        }
        
        h1 {
            text-align: center;
            color: #1c6cb3;
            margin-bottom: 30px;
        }
        
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
        }
        
        label {
            font-weight: 600;
            margin-bottom: 5px;
        }
        
        input,
        textarea {
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }
        
        textarea {
            resize: none;
            height: 40px;
        }
        
        .sex-line {
            margin-top: 15px;
        }
        
        .section {
            margin-top: 25px;
        }
        
        .category-btn {
            width: 100%;
            padding: 10px;
            background: #1c6cb3;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
            text-align: left;
        }
        
        .symptom-box {
            display: none;
            border: 1px solid #ddd;
            padding: 10px;
            margin-top: 5px;
            border-radius: 6px;
            background: #f8faff;
        }
        
        .symptom-item {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 4px 0;
        }
        
        .submit-btn {
            margin-top: 25px;
            width: 100%;
            padding: 12px;
            background: #1c6cb3;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>

    <script>
        function toggleSymptoms(id) {

            var box = document.getElementById(id);

            if (box.style.display === "block") {
                box.style.display = "none";
            } else {
                box.style.display = "block";
            }

        }

        function captureData(event) {

            event.preventDefault();

            /* Fields */

            var name = document.getElementById("patientName").value.trim();
            var age = document.getElementById("age").value.trim();
            var mobile = document.getElementById("mobile").value.trim();
            var address = document.getElementById("address").value.trim();

            /* Validation */

            if (name === "") {
                alert("Please enter Patient Name");
                return;
            }

            if (age === "") {
                alert("Please enter Age");
                return;
            }

            if (mobile === "") {
                alert("Please enter Mobile Number");
                return;
            }

            if (address === "") {
                alert("Please enter Address");
                return;
            }

            /* Sex */

            var sex = document.querySelector('input[name="sex"]:checked');

            if (!sex) {
                alert("Please select Sex");
                return;
            }

            /* Symptoms */

            var symptoms = document.querySelectorAll(".symptom:checked");

            if (symptoms.length === 0) {
                alert("Please select at least one Symptom");
                return;
            }

            /* Generate ID */

            var patientID = "P" + Math.floor(Math.random() * 10000);

            /* Token */

            var token = Math.floor(Math.random() * 50) + 1;

            /* Redirect */

            window.location.href = "success.html?id=" + patientID + "&token=" + token;

        }
    </script>

</head>

<body>

    <div class="overlay">

        <div class="container">

            <h1>Patient Registration</h1>

            <form onsubmit="captureData(event)">

                <div class="form-grid">

                    <div class="form-group">
                        <label>Patient Name</label>
                        <input type="text" id="patientName">
                    </div>

                    <div class="form-group">
                        <label>Age</label>
                        <input type="number" id="age">
                    </div>

                    <div class="form-group">
                        <label>Mobile No.</label>
                        <input type="text" id="mobile">
                    </div>

                    <div class="form-group">
                        <label>Address</label>
                        <textarea id="address"></textarea>
                    </div>

                </div>

                <div class="sex-line">

                    <label>Sex</label>

                    <input type="radio" name="sex"> Male
                    <input type="radio" name="sex"> Female
                    <input type="radio" name="sex"> Other

                </div>

                <div class="section">

                    <label>Symptoms</label>

                    <button type="button" class="category-btn" onclick="toggleSymptoms('gen')">1. General Symptoms</button>

                    <div id="gen" class="symptom-box">

                        <div class="symptom-item"><input type="checkbox" class="symptom"> Fever</div>
                        <div class="symptom-item"><input type="checkbox" class="symptom"> Chills</div>
                        <div class="symptom-item"><input type="checkbox" class="symptom"> Fatigue</div>

                    </div>


                    <button type="button" class="category-btn" onclick="toggleSymptoms('resp')">2. Respiratory Symptoms</button>

                    <div id="resp" class="symptom-box">

                        <div class="symptom-item"><input type="checkbox" class="symptom"> Cough</div>
                        <div class="symptom-item"><input type="checkbox" class="symptom"> Dry Cough</div>
                        <div class="symptom-item"><input type="checkbox" class="symptom"> Shortness of Breath</div>

                    </div>


                    <button type="button" class="category-btn" onclick="toggleSymptoms('card')">3. Cardiovascular Symptoms</button>

                    <div id="card" class="symptom-box">

                        <div class="symptom-item"><input type="checkbox" class="symptom"> Chest Pain</div>
                        <div class="symptom-item"><input type="checkbox" class="symptom"> Palpitations</div>

                    </div>

                </div>

                <button class="submit-btn">Submit Registration</button>

            </form>

        </div>

    </div>

</body>

</html>
