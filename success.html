<!DOCTYPE html>
<html>

<head>

    <title>Patient Token</title>

    <style>
        body {
            margin: 0;
            font-family: Segoe UI, Arial;
            background: linear-gradient(135deg, #e8f2ff, #ffffff);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        
        .ticket {
            width: 420px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            padding: 25px;
            text-align: center;
        }
        
        .header {
            background: #1c6cb3;
            color: white;
            padding: 12px;
            border-radius: 6px;
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        
        .info {
            margin: 10px 0;
            font-size: 18px;
        }
        
        .token {
            font-size: 45px;
            color: #e63946;
            font-weight: bold;
            margin: 15px 0;
        }
        
        .ward {
            font-size: 20px;
            color: #1c6cb3;
            font-weight: bold;
        }
        
        .footer {
            margin-top: 15px;
            font-size: 14px;
            color: #777;
        }
        
        .print-btn {
            margin-top: 20px;
            padding: 10px 20px;
            border: none;
            background: #1c6cb3;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }
        
        .print-btn:hover {
            background: #0f4c8a;
        }
    </style>

    <script>
        function loadData() {

            var params = new URLSearchParams(window.location.search);

            var id = params.get("id");
            var token = params.get("token");
            var ward = params.get("ward");

            var now = new Date();

            var date = now.toLocaleDateString();
            var time = now.toLocaleTimeString();

            document.getElementById("pid").innerText = id;
            document.getElementById("token").innerText = token;
            document.getElementById("ward").innerText = ward;
            document.getElementById("date").innerText = date;
            document.getElementById("time").innerText = time;

        }

        function printSlip() {
            window.print();
        }
    </script>

</head>

<body onload="loadData()">

    <div class="ticket">

        <div class="header">
            Smart Digital Hospital
        </div>

        <div class="info">
            Patient ID : <b id="pid"></b>
        </div>

        <div class="info">
            Date : <span id="date"></span>
        </div>

        <div class="info">
            Time : <span id="time"></span>
        </div>

        <div class="info">
            Token Number :
        </div>

        <div class="token" id="token"></div>

        <div class="info">
            Assigned Ward :
        </div>

        <div class="ward" id="ward"></div>

        <button class="print-btn" onclick="printSlip()">Print Token</button>

        <div class="footer">
            Please wait for your token number to be called
        </div>

    </div>

</body>

</html>
