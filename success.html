<!DOCTYPE html>
<html>

<head>

    <title>Registration Successful</title>

    <style>
        body {
            font-family: Segoe UI;
            background: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        
        .card {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            text-align: center;
            width: 350px;
        }
        
        .token {
            font-size: 50px;
            color: #e63946;
            margin: 20px 0;
        }
        
        button {
            padding: 10px 20px;
            background: #1c6cb3;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 15px;
        }
    </style>

    <script>
        function loadData() {

            var params = new URLSearchParams(window.location.search);

            var id = params.get("id");
            var token = params.get("token");
            var ward = params.get("ward");

            document.getElementById("pid").innerText = id;
            document.getElementById("token").innerText = token;
            document.getElementById("ward").innerText = ward;

        }
    </script>

</head>

<body onload="loadData()">

    <div class="card">

        <h2>Registration Successful</h2>

        <p>Patient ID</p>
        <h3 id="pid"></h3>

        <p>Token Number</p>
        <div class="token" id="token"></div>

        <p>Assigned Ward</p>
        <h3 id="ward"></h3>

        <a href="queue.html">
            <button>View Queue Screen</button>
        </a>

    </div>

</body>

</html>
