<!DOCTYPE html>
<html>

<head>

    <title>Token Slip</title>

    <style>
        body {
            font-family: Segoe UI;
            background: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        
        .card {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            text-align: center;
        }
        
        .token {
            font-size: 50px;
            color: red;
            margin: 20px;
        }
    </style>

    <script>
        function loadData() {

            var params = new URLSearchParams(window.location.search);

            document.getElementById("pid").innerText = params.get("id");
            document.getElementById("token").innerText = params.get("token");
            document.getElementById("ward").innerText = params.get("ward");

        }
    </script>

</head>

<body onload="loadData()">

    <div class="card">

        <h2>Registration Successful</h2>

        <p>Patient ID</p>
        <h3 id="pid"></h3>

        <p>Token Number</p>
        <div class="token" id="token"></div>

        <p>Assigned Ward</p>
        <h3 id="ward"></h3>

        <a href="queue.html">
            <button>Go to Queue Display</button>
        </a>

    </div>

</body>

</html>
