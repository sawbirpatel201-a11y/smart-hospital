<!DOCTYPE html>
<html>

<head>

    <title>Patient Slip</title>

    <style>
        body {
            margin: 0;
            font-family: Segoe UI;
            background: linear-gradient(135deg, #1c6cb3, #74b9ff);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            background: white;
            padding: 60px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            width: 500px;
        }
        
        .tick {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #28a745;
            color: white;
            font-size: 55px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: auto;
            margin-bottom: 20px;
        }
        
        .id {
            font-size: 24px;
            margin-top: 10px;
        }
        
        .token {
            font-size: 70px;
            color: #1c6cb3;
            font-weight: bold;
        }
        
        .print-btn {
            margin-top: 25px;
            padding: 12px 25px;
            background: #1c6cb3;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }
    </style>

    <script>
        window.onload = function() {

            var params = new URLSearchParams(window.location.search);

            var id = params.get("id");
            var token = params.get("token");
            var dept = params.get("dept");

            document.getElementById("patientID").innerText = id;
            document.getElementById("token").innerText = token;
            document.getElementById("dept").innerText = dept;

        }

        /* Print Slip */

        function printSlip() {

            window.print();

        }
    </script>

</head>

<body>

    <div class="container">

        <div class="tick">✔</div>

        <h1>Registration Successful</h1>

        <div class="id">
            Patient ID : <span id="patientID"></span>
        </div>

        <div class="id">
            Department : <span id="dept"></span>
        </div>

        <div class="id">
            Your Token Number
        </div>

        <div class="token" id="token"></div>

        <button class="print-btn" onclick="printSlip()">Print Token Slip</button>

    </div>

</body>

</html>
